<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlockieCraft Main Menu</title>
  <link rel="icon" type="image/x-icon" href="assets/fav.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ui-bg:#747a84;
      --ui-bg-dark:#5a6069;
      --ui-border-light:#adb2ba;
      --ui-border-dark:#2a2f36;
      --ui-text:#f4f6f8;
      --ui-shadow:#000;
      --gold:#ffe94a;
      --gold-dim:#c9b832;
      --line:#a3abb5;
      --panel-fill:#1e2329;
      --panel-fill-2:#14181d;
      --menu-glow:rgba(255,255,255,0.04);
    }

    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden}

    body{
      font-family:"Silkscreen", monospace;
      color:var(--ui-text);
      background:#0f151c;
    }

    #bgCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
      pointer-events:none;
      transition:opacity 140ms ease;
    }

    .vignette{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(0,0,0,0) 18%, rgba(0,0,0,0.38) 72%, rgba(0,0,0,0.62) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 28%, rgba(0,0,0,0.28) 100%);
    }

    .scanline{
      position:fixed;
      inset:0;
      z-index:2;
      pointer-events:none;
      opacity:0.35;
      background:repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.008) 0,
        rgba(255,255,255,0.008) 1px,
        rgba(0,0,0,0) 1px,
        rgba(0,0,0,0) 4px
      );
    }

    .top-row{
      position:fixed;
      top:12px;
      left:12px;
      right:12px;
      z-index:5;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .menu-list-btn{
      min-width:130px;
      font-size:12px;
      padding:8px 10px;
    }

    .corner-icons{display:flex;gap:8px}

    .icon-btn{
      width:46px;
      height:44px;
      font-size:11px;
      padding:0;
      display:grid;
      place-items:center;
    }

    .shell{
      position:relative;
      z-index:4;
      height:100%;
      width:min(860px, 100vw);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:60px 12px 26px;
      gap:26px;
    }

    .logo-wrap{
      position:relative;
      width:min(700px, 94vw);
      margin-top:-2px;
      margin-bottom:14px;
      display:flex;
      justify-content:center;
      align-items:center;
      animation:logoIn 420ms ease-out;
    }

    .logo-wrap img{
      width:min(620px, 92vw);
      max-height:29vh;
      object-fit:contain;
      image-rendering:pixelated;
      filter:brightness(0.82) saturate(1.06) drop-shadow(0 5px 0 rgba(0,0,0,0.55)) drop-shadow(0 12px 28px rgba(0,0,0,0.42));
      user-select:none;
      pointer-events:none;
    }
    .logo-wrap img.logo-hidden{display:none}
    .logo-fallback{
      display:none;
      font-family:"Silkscreen","VT323",monospace;
      font-size:clamp(2.4rem,7vw,4.6rem);
      font-weight:700;
      letter-spacing:.01em;
      color:#fff;
      text-shadow:4px 4px 0 rgba(0,0,0,.6);
      user-select:none;
      pointer-events:none;
    }
    .logo-fallback span{color:#7cc24a}
    .logo-fallback.show{display:block}

    .splash{
      position:absolute;
      right:-1.5%;
      bottom:30px;
      color:var(--gold);
      font-size:clamp(11px, 1.55vw, 18px);
      text-shadow:2px 2px 0 #3f3704, 0 0 18px rgba(255,233,74,0.14);
      transform-origin:85% 60%;
      white-space:nowrap;
      transform:translate3d(0,0,0) rotate(-20deg) scale(1);
      will-change:transform;
      backface-visibility:hidden;
      pointer-events:none;
      user-select:none;
    }

    .menu-column{
      width:min(486px, 94vw);
      margin-top:64px;
      display:flex;
      flex-direction:column;
      gap:9px;
      padding:10px 12px;
      border-radius:2px;
      background:linear-gradient(180deg, rgba(12,15,19,0.22), rgba(8,10,13,0.08));
      border:1px solid rgba(255,255,255,0.05);
      box-shadow:0 10px 28px rgba(0,0,0,0.18);
      animation:menuIn 650ms ease-out;
    }

    .pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}

    .mc-btn{
      appearance:none;
      --btn-hi:var(--ui-border-light);
      --btn-lo:var(--ui-border-dark);
      --btn-frame:#1b1f25;
      --btn-corner:#090b0e;
      border:0;
      background:linear-gradient(180deg, var(--ui-bg), var(--ui-bg-dark));
      color:var(--ui-text);
      font-family:"Silkscreen", monospace;
      font-size:13px;
      letter-spacing:0.2px;
      padding:12px 10px;
      text-shadow:1px 1px 0 var(--ui-shadow);
      cursor:pointer;
      transition:filter 90ms, transform 70ms;
      position:relative;
      overflow:hidden;
      clip-path:polygon(
        2px 0,
        calc(100% - 2px) 0,
        calc(100% - 2px) 2px,
        100% 2px,
        100% calc(100% - 2px),
        calc(100% - 2px) calc(100% - 2px),
        calc(100% - 2px) 100%,
        2px 100%,
        2px calc(100% - 2px),
        0 calc(100% - 2px),
        0 2px,
        2px 2px
      );
      box-shadow:
        inset 0 2px 0 var(--btn-hi),
        inset 2px 0 0 var(--btn-hi),
        inset 0 -2px 0 var(--btn-lo),
        inset -2px 0 0 var(--btn-lo),
        0 0 0 2px var(--btn-frame),
        0 0 0 4px var(--btn-corner);
    }

    .mc-btn::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(var(--btn-corner),var(--btn-corner)) left top/2px 2px no-repeat,
        linear-gradient(var(--btn-corner),var(--btn-corner)) right top/2px 2px no-repeat,
        linear-gradient(var(--btn-corner),var(--btn-corner)) left bottom/2px 2px no-repeat,
        linear-gradient(var(--btn-corner),var(--btn-corner)) right bottom/2px 2px no-repeat;
    }

    .mc-btn::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0));
      opacity:0.6;
      pointer-events:none;
    }

    .mc-btn:hover{filter:brightness(1.08) saturate(1.05);transform:translateY(-1px)}
    .mc-btn:active{transform:translateY(1px);filter:brightness(0.94)}

    .mc-btn.primary{
      --btn-hi:#c8dbba;
      --btn-lo:#33502d;
      --btn-frame:#1f3a1a;
      --btn-corner:#0e170c;
      background:linear-gradient(180deg, #8cae77, #6f925f);
    }

    .mc-btn.warn{
      --btn-hi:#caa79a;
      --btn-lo:#5f3c31;
      --btn-frame:#4a2f27;
      --btn-corner:#1f1411;
      background:linear-gradient(180deg, #9e7264, #845a4d);
    }

    .menu-column .mc-btn:nth-child(1){animation:btnIn 300ms ease-out both 130ms}
    .menu-column .mc-btn:nth-child(2){animation:btnIn 300ms ease-out both 200ms}
    .menu-column .mc-btn:nth-child(3){animation:btnIn 300ms ease-out both 270ms}
    .menu-column .pair{animation:btnIn 300ms ease-out both 340ms}

    .help-box{
      width:min(486px, 94vw);
      min-height:44px;
      padding:9px 12px;
      font-family:"VT323", monospace;
      font-size:27px;
      line-height:1.1;
      color:#dde4ec;
      text-align:center;
      text-shadow:1px 1px 0 rgba(0,0,0,0.75);
      background:rgba(16,20,25,0.62);
      border:1px solid rgba(181,189,198,0.22);
      box-shadow:0 8px 22px rgba(0,0,0,0.22);
      opacity:0;
      transform:translateY(6px);
      transition:opacity 150ms, transform 150ms;
      pointer-events:none;
    }

    .help-box.show{opacity:1;transform:translateY(0)}

    .footer-left,
    .footer-right{
      position:fixed;
      bottom:10px;
      z-index:5;
      font-size:11px;
      text-shadow:1px 1px 0 #000;
      color:#e4e8ec;
      opacity:0.9;
    }

    .footer-left{left:10px}
    .footer-right{right:10px}

    .overlay{
      position:fixed;
      inset:0;
      z-index:7;
      display:none;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at center, rgba(58,70,82,0.24), rgba(10,12,14,0.84));
      padding:12px;
    }

    .overlay.open{display:flex}

    .panel-card{
      width:min(560px, 100%);
      background:linear-gradient(180deg, #2a2e35, #1b1f24);
      border:2px solid #11151a;
      border-top-color:#858b94;
      border-left-color:#858b94;
      border-right-color:#1a1f24;
      border-bottom-color:#1a1f24;
      box-shadow:0 16px 34px rgba(0,0,0,0.56);
      padding:12px;
      animation:panelIn 150ms ease-out;
    }

    .panel-card.world-select-card{width:min(740px, 100%)}

    #worldSelectOverlay{
      z-index:12;
      padding:0;
      background:
        radial-gradient(circle at 22% 8%, rgba(255,255,255,0.11), rgba(255,255,255,0) 42%),
        repeating-linear-gradient(45deg, #2a2118 0 8px, #241c14 8px 16px),
        repeating-linear-gradient(-45deg, #20190f 0 8px, #261e15 8px 16px);
    }

    #worldSelectOverlay.open{display:block}

    #worldSelectOverlay::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.44) 0 128px, rgba(0,0,0,0) 128px calc(100% - 132px), rgba(0,0,0,0.44) calc(100% - 132px) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0)) top/100% 120px no-repeat;
      z-index:0;
    }

    .singleplayer-screen{
      height:100%;
      width:min(980px,100%);
      margin:0 auto;
      padding:16px 18px 16px;
      display:grid;
      grid-template-rows:auto auto minmax(250px,1fr) auto auto;
      gap:8px;
      position:relative;
      z-index:1;
      animation:panelIn 110ms ease-out;
    }

    .singleplayer-title{
      margin:0;
      text-align:center;
      font-size:22px;
      color:#f1f3f6;
      text-shadow:3px 3px 0 #000;
      letter-spacing:0.3px;
    }

    .singleplayer-searchbar{
      height:60px;
      width:min(590px, 88vw);
      margin:0 auto;
      border:3px solid #efefef;
      background:#000;
      box-shadow:inset 0 0 0 2px #1d1d1d, 0 2px 0 rgba(0,0,0,0.55);
    }

    #worldSelectOverlay .world-list{
      min-height:0;
      max-height:none;
      margin:0;
      padding:8px 10px;
      border-top:2px solid rgba(0,0,0,0.80);
      border-bottom:2px solid rgba(0,0,0,0.80);
      background:rgba(0,0,0,0.58);
      display:flex;
      flex-direction:column;
      gap:4px;
      overflow-y:auto;
    }

    #worldSelectOverlay .world-row{
      width:min(860px,100%);
      margin:0 auto;
      text-align:left;
      background:rgba(0,0,0,0.18);
      border:2px solid transparent;
      color:#eef2f6;
      padding:7px 8px;
      cursor:pointer;
      font-family:"Silkscreen", monospace;
      display:grid;
      grid-template-columns:64px 1fr;
      gap:10px;
      align-items:center;
      box-shadow:none;
    }

    #worldSelectOverlay .world-row:hover{background:rgba(255,255,255,0.08)}

    #worldSelectOverlay .world-row.active{
      background:rgba(131,136,145,0.35);
      border-color:#f3f4f6;
    }

    .world-thumb{
      width:64px;
      height:48px;
      border:1px solid #0b0b0b;
      background:#11161b;
      padding:1px;
      position:relative;
      image-rendering:pixelated;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.09),
        inset 0 0 10px rgba(0,0,0,0.32),
        0 1px 0 rgba(255,255,255,0.12);
    }

    .world-thumb-img{
      display:block;
      width:100%;
      height:100%;
      object-fit:cover;
      image-rendering:pixelated;
      filter:contrast(1.04) saturate(1.07);
    }

    #worldSelectOverlay .world-row.active .world-thumb-img{
      filter:contrast(1.12) saturate(1.14);
    }

    .world-info{min-width:0}

    #worldSelectOverlay .world-name{
      font-size:15px;
      line-height:1.1;
      color:#f1f2f5;
      text-shadow:2px 2px 0 #000;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    #worldSelectOverlay .world-meta,
    .world-submeta{
      margin-top:3px;
      font-family:"Silkscreen", monospace;
      font-size:12px;
      line-height:1.15;
      color:#8f96a1;
      text-shadow:1px 1px 0 #000;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .world-submeta{color:#a6adb8}

    #worldSelectOverlay .empty-worlds{
      min-height:100%;
      border:0;
      background:transparent;
      color:#d2d6de;
      font-size:34px;
      text-shadow:2px 2px 0 #000;
    }

    .singleplayer-actions-top{
      width:min(880px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .singleplayer-actions-bottom{
      width:min(880px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    #worldSelectOverlay .singleplayer-actions-top .mc-btn{height:54px;font-size:16px}
    #worldSelectOverlay .singleplayer-actions-bottom .mc-btn{height:48px;font-size:14px}

    #worldSelectOverlay .singleplayer-actions-top .mc-btn::after,
    #worldSelectOverlay .singleplayer-actions-bottom .mc-btn::after{
      opacity:0.32;
    }

    .world-list{
      min-height:246px;
      max-height:min(52vh, 420px);
      overflow-y:auto;
      padding:6px;
      margin-bottom:10px;
      border:2px solid #0f1318;
      border-top-color:#54606b;
      border-left-color:#54606b;
      border-right-color:#1d252d;
      border-bottom-color:#1d252d;
      background:#0f1419;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .world-row{
      width:100%;
      text-align:left;
      background:linear-gradient(180deg, #3a4048, #2e333a);
      border:2px solid #20242a;
      border-top-color:#7b848f;
      border-left-color:#7b848f;
      border-right-color:#1e2329;
      border-bottom-color:#1e2329;
      color:#eef2f6;
      padding:8px 10px;
      cursor:pointer;
      font-family:"Silkscreen", monospace;
    }

    .world-row.active{
      background:linear-gradient(180deg, #6f925f, #5d7f50);
      border-top-color:#c8dbba;
      border-left-color:#c8dbba;
      border-right-color:#33502d;
      border-bottom-color:#33502d;
    }

    .world-name{font-size:12px;color:#f3f6fa;text-shadow:1px 1px 0 #000}

    .world-meta{
      margin-top:2px;
      font-family:"VT323", monospace;
      font-size:24px;
      line-height:1;
      color:#b9c8da;
      text-shadow:1px 1px 0 #000;
    }

    .empty-worlds{
      min-height:226px;
      display:grid;
      place-items:center;
      text-align:center;
      white-space:pre-line;
      color:#b7c5d7;
      font-family:"VT323", monospace;
      font-size:30px;
      line-height:0.95;
      text-shadow:1px 1px 0 #000;
      padding:16px;
    }

    .panel-title{
      margin:0 0 10px;
      text-align:center;
      font-size:15px;
      color:#f1f3f5;
      text-shadow:1px 1px 0 #000;
    }

    .field{margin-bottom:9px}

    .field label{
      display:block;
      margin-bottom:3px;
      font-size:13px;
      color:#d9dde2;
      text-shadow:1px 1px 0 #000;
    }

    .field input,
    .field select{
      width:100%;
      background:#12161b;
      color:#f1f4f7;
      border:2px solid #0a0e12;
      border-top-color:#59626c;
      border-left-color:#59626c;
      border-right-color:#1d252d;
      border-bottom-color:#1d252d;
      font-family:"VT323", monospace;
      font-size:29px;
      line-height:1;
      padding:7px 9px;
      outline:none;
    }

    .field input:focus,
    .field select:focus{filter:brightness(1.07)}

    .field.range input{padding:0}
    .field.range .range-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .field.range .range-val{font-family:"VT323", monospace;font-size:28px;color:#d4e1f0;text-shadow:1px 1px 0 #000;min-width:48px;text-align:right}

    input[type="range"]{height:32px}

    .seed-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:stretch}

    .seed-row .mc-btn{padding-inline:12px;min-width:116px}

    .hint{
      margin-top:4px;
      min-height:14px;
      font-family:"VT323", monospace;
      font-size:23px;
      color:#b8c7d7;
      text-shadow:1px 1px 0 #000;
    }

    .actions{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .actions.single{grid-template-columns:1fr}
    .actions.triple{grid-template-columns:1fr 1fr 1fr}

    .toast{
      position:fixed;
      left:50%;
      top:14%;
      transform:translateX(-50%);
      z-index:9;
      padding:6px 12px;
      font-family:"VT323", monospace;
      font-size:26px;
      color:#f3f5f7;
      text-shadow:1px 1px 0 #000;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(18,21,26,0.8);
      opacity:0;
      transition:opacity 120ms, transform 120ms;
      pointer-events:none;
      white-space:nowrap;
      max-width:min(92vw, 680px);
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @keyframes logoIn{
      from{opacity:0;transform:translateY(-14px) scale(0.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @keyframes menuIn{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }

    @keyframes btnIn{
      from{opacity:0;transform:translateY(5px)}
      to{opacity:1;transform:translateY(0)}
    }

    @keyframes panelIn{
      from{transform:translateY(8px) scale(0.98);opacity:0}
      to{transform:translateY(0) scale(1);opacity:1}
    }

    @media (max-width:700px){
      .menu-column{width:min(420px, 95vw);margin-top:36px}
      .logo-wrap img{max-height:24vh}
      .splash{right:-4%;bottom:24px}
      .pair{grid-template-columns:1fr}
      .menu-list-btn{min-width:112px}
      .icon-btn{width:40px;height:40px;font-size:10px}
      .footer-right{display:none}
      .actions.triple{grid-template-columns:1fr}
      .singleplayer-screen{padding:12px 10px 12px;grid-template-rows:auto auto minmax(180px,1fr) auto auto}
      .singleplayer-title{font-size:18px}
      .singleplayer-searchbar{height:46px;width:min(480px,94vw)}
      .singleplayer-actions-top{grid-template-columns:1fr}
      .singleplayer-actions-bottom{grid-template-columns:1fr 1fr}
      #worldSelectOverlay .world-row{grid-template-columns:52px 1fr;gap:8px;padding:6px 7px}
      .world-thumb{width:52px;height:40px}
      #worldSelectOverlay .world-meta,
      .world-submeta{font-size:11px;line-height:1.12}
      #worldSelectOverlay .singleplayer-actions-top .mc-btn{height:48px;font-size:14px}
      #worldSelectOverlay .singleplayer-actions-bottom .mc-btn{height:44px;font-size:13px}
    }

    @media (max-height:620px){
      .shell{padding-top:58px;gap:12px}
      .menu-column{margin-top:10px}
      .logo-wrap img{max-height:20vh}
      .logo-wrap{margin-bottom:6px}
      .help-box{display:none}
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <div class="top-row">
    <button id="menuListBtn" class="mc-btn menu-list-btn" type="button">Menu List</button>
    <div class="corner-icons">
      <button id="langBtn" class="mc-btn icon-btn" type="button" title="Language">EN</button>
      <button id="packBtn" class="mc-btn icon-btn" type="button" title="Resource Pack">RP</button>
    </div>
  </div>

  <main class="shell">
    <section class="logo-wrap" aria-label="BlockieCraft logo">
      <img id="logoImg" src="assets/BlockieCraftLogo.png" alt="BlockieCraft logo" loading="eager" fetchpriority="high" width="620" height="180" />
      <div class="logo-fallback" id="logoFallback">Blockie<span>Craft</span></div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <audio id="menuMusic" src="assets/menuaudio1.mp3" loop preload="auto"></audio>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js";

    const SPLASH_LINES=[
      "Blocks breathe now.",
      "Trees grow right-side up!",
      "Fog you can actually see through.",
      "Occlusion culling: now with 100% less void.",
      "New menu seed. Old vibes.",
      "Rivers that know where they're going.",
      "Caves with actual structure.",
      "Biomes that don't just blend.",
      "Sunsets hit different now.",
      "One chunk at a time.",
      "Your world. Your seed. Your rules.",
      "No more floating leaf islands.",
      "Clouds cast shadows. Finally.",
      "Wild preset lives up to the name.",
      "Cactus still hurts. You were warned.",
      "Torchlight dances at dusk.",
      "Resource packs: click to swap.",
      "Survival means something again.",
      "Generated fresh. Every time.",
      "Don't dig straight down. Seriously.",
      "Look up. The stars are new.",
      "Alpha 0.7.0 — still here.",
      "Press Singleplayer. Begin."
    ];

    const SPLASH_LINE_RARE=[
      "You're not supposed to read this!",
      "404: Splash joke not found.",
      "This text is definitely canon.",
      "The cake is a lie. The blocks are real.",
      "Made with excessive terrain math.",
      "Don't dig straight down. Again.",
      "Also try: /seed",
      "Herobrine removed. Again.",
      "Infinite worlds. Finite patience.",
      "The void stares back. Now with fog."
    ];

    const PRESET_HINTS={
      classic:"Gentle terrain and fewer dramatic peaks.",
      balanced:"Default profile with stable rivers and clean coasts.",
      wild:"Higher relief and sharper terrain transitions."
    };

    const DEFAULT_SETTINGS={
      fpsLimit:0,
      renderDist:2,
      fov:75,
      brightness:50,
      shadows:false,
      clouds:true,
      particles:false,
      viewBobbing:true,
      showFPS:true,
      fullscreen:false,
      masterVolume:50,
      musicVolume:100,
      sfx:true,
      mouseSens:50
    };

    const ADJ=["silent","frost","ember","wild","ancient","twisted","verdant","ashen","lunar","raven"];
    const NOUN=["valley","canyon","archipelago","spire","delta","grove","mesa","marsh","ridge","hollow"];

    const WORLD_STORAGE_KEY="blockiecraft_worlds";
    const LAST_WORLD_ID_KEY="blockiecraft_last_world_id";
    const RESOURCE_PACK_STORAGE_KEY="blockiecraft_resource_pack";
    const RESOURCE_PACK_OPTIONS=[
      {id:"classic-lite",label:"Classic Lite"},
      {id:"default",label:"Default (Procedural)"}
    ];
    const GAME_VERSION=(document.querySelector(".footer-left")?.textContent||"Alpha 0.7.0").trim();

    const worldSelectOverlay=document.getElementById("worldSelectOverlay");
    const worldSettingsOverlay=document.getElementById("worldSettingsOverlay");
    const worldSettingsForm=document.getElementById("worldSettingsForm");
    const worldSettingsTitle=document.getElementById("worldSettingsTitle");
    const worldList=document.getElementById("worldList");

    const worldNameInput=document.getElementById("worldName");
    const seedInput=document.getElementById("seedInput");
    const presetSelect=document.getElementById("presetSelect");
    const renderDistInput=document.getElementById("renderDist");
    const seedPreview=document.getElementById("seedPreview");
    const presetHint=document.getElementById("presetHint");

    const playWorldBtn=document.getElementById("playWorldBtn");
    const createWorldOpenBtn=document.getElementById("createWorldOpenBtn");
    const editWorldBtn=document.getElementById("editWorldBtn");
    const deleteWorldBtn=document.getElementById("deleteWorldBtn");
    const recreateWorldBtn=document.getElementById("recreateWorldBtn");
    const cancelWorldSelectBtn=document.getElementById("cancelWorldSelectBtn");
    const backWorldSettingsBtn=document.getElementById("backWorldSettingsBtn");
    const saveWorldBtn=document.getElementById("saveWorldBtn");
    const saveAndPlayBtn=document.getElementById("saveAndPlayBtn");
    const randomSeedBtn=document.getElementById("randomSeedBtn");

    const optionsOverlay=document.getElementById("optionsOverlay");
    const optionsForm=document.getElementById("optionsForm");
    const optMaster=document.getElementById("optMaster");
    const optMusic=document.getElementById("optMusic");
    const optMasterVal=document.getElementById("optMasterVal");
    const optMusicVal=document.getElementById("optMusicVal");
    const optRenderDist=document.getElementById("optRenderDist");
    const optSfx=document.getElementById("optSfx");
    const optShowFPS=document.getElementById("optShowFPS");

    const splashText=document.getElementById("splashText");
    const helpBox=document.getElementById("helpBox");
    const toast=document.getElementById("toast");
    const packBtn=document.getElementById("packBtn");
    const menuMusic=document.getElementById("menuMusic");
    const clickSfx=document.getElementById("clickSfx");

    // ── Logo: retry a couple of times (GitHub Pages assets can 503
    // transiently), then fall back to a text logo instead of a broken image.
    (function initLogo(){
      const img=document.getElementById("logoImg");
      const fallback=document.getElementById("logoFallback");
      if(!img||!fallback)return;
      const src=img.getAttribute("src");
      let attempt=0;
      const maxAttempts=3;
      img.addEventListener("error",()=>{
        attempt++;
        if(attempt<maxAttempts){
          setTimeout(()=>{img.src=`${src}?retry=${attempt}`;},600*attempt);
        }else{
          img.classList.add("logo-hidden");
          fallback.classList.add("show");
        }
      });
    })();

    // ── Audio: once an asset has failed to load in this session, stop
    // retrying it on every click — that's what was spamming 503s in the
    // console. One more attempt is allowed after a short cooldown.
    const audioFailState=new Map(); // element -> {failedAt}
    const AUDIO_RETRY_COOLDOWN_MS=3000;
    function audioRecentlyFailed(el){
      const st=audioFailState.get(el);
      return st&&(performance.now()-st.failedAt)<AUDIO_RETRY_COOLDOWN_MS;
    }
    function markAudioFailed(el){
      audioFailState.set(el,{failedAt:performance.now()});
    }

    menuMusic.addEventListener("error",()=>markAudioFailed(menuMusic));
    clickSfx.addEventListener("error",()=>markAudioFailed(clickSfx));

    let toastTimer=null;
    let helpVisible=false;
    let selectedWorldId=null;
    let worldSettingsMode="create";
    let editingWorldId=null;
    let worldPanelWasOpen=false;
    let musicUnlockArmed=false;
    let musicStarted=false;
    let clickSfxUnlockArmed=false;
    let clickSfxUnlocked=false;
    let menuBackgroundSuspended=false;
    let selectedResourcePackId="classic-lite";

    function showToast(text,ms=1600){
      toast.textContent=text;
      toast.classList.add("show");
      if(toastTimer)clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>toast.classList.remove("show"),ms);
    }

    function hashSeed(text){
      let h=2166136261;
      for(let i=0;i<text.length;i++){
        h^=text.charCodeAt(i);
        h=Math.imul(h,16777619);
      }
      return h>>>0;
    }

    function randomUint32(){
      if(window.crypto&&window.crypto.getRandomValues){
        const arr=new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return arr[0]>>>0;
      }
      return (Math.random()*4294967295)>>>0;
    }

    function setRandomSplash(){
      const useRare=Math.random()<0.05&&SPLASH_LINE_RARE.length>0;
      const pool=useRare?SPLASH_LINE_RARE:SPLASH_LINES;
      splashText.textContent=pool[Math.floor(Math.random()*pool.length)]||"";
    }

    let splashAnimStart=0;
    function animateSplash(ts){
      if(!splashAnimStart)splashAnimStart=ts;
      const t=(ts-splashAnimStart)*0.001;
      const wave=Math.sin(t*2.35);
      const scale=1+wave*0.065;
      const lift=wave*-3.2;
      splashText.style.transform=`translate3d(0,${lift.toFixed(3)}px,0) rotate(-20deg) scale(${scale.toFixed(4)})`;
      requestAnimationFrame(animateSplash);
    }
    requestAnimationFrame(animateSplash);

    function randomSeedString(){
      const a=ADJ[Math.floor(Math.random()*ADJ.length)];
      const b=NOUN[Math.floor(Math.random()*NOUN.length)];
      const n=Math.floor(100+Math.random()*900);
      return a+"-"+b+"-"+n;
    }

    const worldThumbCache=new Map();

    function createSeededRandom(seed){
      let state=(seed>>>0)||1;
      return ()=>{
        state=(Math.imul(state,1664525)+1013904223)>>>0;
        return state/4294967296;
      };
    }

    function getWorldThumbDataUrl(world){
      const cacheKey=`${world.id}|${world.seed}|${world.worldName}|${world.preset}`;
      if(worldThumbCache.has(cacheKey))return worldThumbCache.get(cacheKey);

      const canvas=document.createElement("canvas");
      canvas.width=64;
      canvas.height=48;
      const ctx=canvas.getContext("2d",{alpha:false});
      if(!ctx)return "";

      const seed=hashSeed(cacheKey);
      const rand=createSeededRandom(seed);

      let skyTop="#6f8ec1";
      let skyBottom="#9bb7de";
      if(world.preset==="wild"){
        skyTop="#607eae";
        skyBottom="#8fb0d9";
      }else if(world.preset==="classic"){
        skyTop="#7a97c8";
        skyBottom="#aac4e6";
      }

      const sky=ctx.createLinearGradient(0,0,0,30);
      sky.addColorStop(0,skyTop);
      sky.addColorStop(1,skyBottom);
      ctx.fillStyle=sky;
      ctx.fillRect(0,0,64,30);

      ctx.fillStyle="rgba(255,245,196,0.9)";
      ctx.fillRect(5+Math.floor(rand()*14),4+Math.floor(rand()*4),4,4);

      for(let i=0;i<3;i++){
        const cloudY=4+Math.floor(rand()*12);
        const cloudX=Math.floor(rand()*48);
        const w=8+Math.floor(rand()*12);
        ctx.fillStyle="rgba(255,255,255,0.30)";
        ctx.fillRect(cloudX,cloudY,w,2);
      }

      const baseLine=22+Math.floor(rand()*3);
      const amp=4+Math.floor(rand()*4);
      const freq=0.11+rand()*0.08;

      ctx.fillStyle="#4f5f43";
      ctx.beginPath();
      ctx.moveTo(0,48);
      for(let x=0;x<64;x++){
        const y=baseLine+Math.floor(Math.sin((x*freq)+(rand()*6.28))*amp);
        ctx.lineTo(x,y);
      }
      ctx.lineTo(63,48);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle="#5f6f4f";
      ctx.fillRect(0,30,64,8);
      ctx.fillStyle="#3d2f21";
      ctx.fillRect(0,38,64,10);

      if(rand()>0.45){
        const riverY=30+Math.floor(rand()*5);
        ctx.fillStyle="#456a94";
        ctx.fillRect(0,riverY,64,2);
      }

      const treeX=10+Math.floor(rand()*44);
      const treeY=24+Math.floor(rand()*7);
      ctx.fillStyle="#4a3323";
      ctx.fillRect(treeX,treeY,2,6);
      ctx.fillStyle="#2f5f34";
      ctx.fillRect(treeX-2,treeY-3,6,3);
      ctx.fillRect(treeX-1,treeY-5,4,2);

      const url=canvas.toDataURL("image/png");
      worldThumbCache.set(cacheKey,url);
      return url;
    }

    function effectiveSeed(){
      const txt=seedInput.value.trim();
      return txt||"(random when saved)";
    }

    function updateSeedPreview(){
      seedPreview.textContent="Effective seed: "+effectiveSeed();
    }

    function updatePresetHint(){
      presetHint.textContent=PRESET_HINTS[presetSelect.value]||"";
    }

    function formatPresetName(preset){
      if(!preset)return "Balanced";
      return preset.charAt(0).toUpperCase()+preset.slice(1);
    }

    function getSettings(){
      try{return Object.assign({},DEFAULT_SETTINGS,JSON.parse(localStorage.getItem("blockiecraft_settings")||"{}"));}
      catch(e){return {...DEFAULT_SETTINGS};}
    }

    function saveSettings(next){
      const merged=Object.assign({},getSettings(),next);
      localStorage.setItem("blockiecraft_settings",JSON.stringify(merged));
      return merged;
    }

    function normalizeResourcePackId(raw){
      const id=String(raw??"").trim().toLowerCase();
      if(id==="off"||id==="none")return "default";
      return RESOURCE_PACK_OPTIONS.some(opt=>opt.id===id)?id:"classic-lite";
    }

    function resourcePackLabel(id){
      return RESOURCE_PACK_OPTIONS.find(opt=>opt.id===id)?.label||"Classic Lite";
    }

    function loadSelectedResourcePackId(){
      try{return normalizeResourcePackId(localStorage.getItem(RESOURCE_PACK_STORAGE_KEY)||"classic-lite");}
      catch(e){return "classic-lite";}
    }

    function saveSelectedResourcePackId(id){
      selectedResourcePackId=normalizeResourcePackId(id);
      try{localStorage.setItem(RESOURCE_PACK_STORAGE_KEY,selectedResourcePackId);}catch(e){}
      syncPackButtonState();
      return selectedResourcePackId;
    }

    function syncPackButtonState(){
      if(!packBtn)return;
      const label=resourcePackLabel(selectedResourcePackId);
      packBtn.title=`Resource Pack: ${label} (click to switch)`;
      packBtn.setAttribute("aria-label",`Resource Pack: ${label}`);
      packBtn.dataset.pack=selectedResourcePackId;
    }

    function cycleResourcePackSelection(){
      const idx=RESOURCE_PACK_OPTIONS.findIndex(opt=>opt.id===selectedResourcePackId);
      const next=RESOURCE_PACK_OPTIONS[(idx+1+RESOURCE_PACK_OPTIONS.length)%RESOURCE_PACK_OPTIONS.length];
      saveSelectedResourcePackId(next.id);
      showToast(`Resource pack set to ${next.label}.`,1700);
    }

    function worldTimestampLabel(v){
      const d=new Date(v||Date.now());
      return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    }

    function normalizeWorldEntry(raw){
      if(!raw||typeof raw!=="object")return null;
      const worldName=(String(raw.worldName||"Overworld").trim()||"Overworld").slice(0,32);
      const seed=String(raw.seed||"").trim();
      const preset=PRESET_HINTS[raw.preset]?raw.preset:"balanced";
      const renderDist=Math.max(2,Math.min(8,Math.round(Number(raw.renderDist)||3)));
      const resourcePack=normalizeResourcePackId(raw.resourcePack||"classic-lite");
      const createdAt=Number(raw.createdAt)||Date.now();
      const updatedAt=Number(raw.updatedAt)||createdAt;
      const lastPlayedAt=Number(raw.lastPlayedAt)||0;
      const id=String(raw.id||("world-"+hashSeed(worldName+seed+createdAt).toString(36)));
      return {id,worldName,seed,preset,renderDist,resourcePack,createdAt,updatedAt,lastPlayedAt};
    }

    function getWorlds(){
      try{
        const parsed=JSON.parse(localStorage.getItem(WORLD_STORAGE_KEY)||"[]");
        if(!Array.isArray(parsed))return [];
        return parsed
          .map(normalizeWorldEntry)
          .filter(Boolean)
          .sort((a,b)=>((b.lastPlayedAt||b.updatedAt||b.createdAt)-(a.lastPlayedAt||a.updatedAt||a.createdAt)));
      }catch(e){
        return [];
      }
    }

    function saveWorlds(nextWorlds){
      localStorage.setItem(WORLD_STORAGE_KEY,JSON.stringify(nextWorlds));
    }

    function rememberSelectedWorld(id){
      selectedWorldId=id;
      if(id)localStorage.setItem(LAST_WORLD_ID_KEY,id);
      else localStorage.removeItem(LAST_WORLD_ID_KEY);
    }

    function migrateLegacyLastWorld(){
      const existing=getWorlds();
      if(existing.length)return;
      try{
        const raw=localStorage.getItem("blockiecraft_last_world");
        if(!raw)return;
        const cfg=JSON.parse(raw);
        const now=Date.now();
        const migrated=normalizeWorldEntry({
          id:"legacy-"+now.toString(36),
          worldName:cfg.worldName||"Overworld",
          seed:cfg.seed||randomSeedString(),
          preset:cfg.preset||"balanced",
          renderDist:cfg.renderDist||3,
          resourcePack:selectedResourcePackId,
          createdAt:now,
          updatedAt:now,
          lastPlayedAt:now
        });
        if(!migrated)return;
        saveWorlds([migrated]);
        rememberSelectedWorld(migrated.id);
      }catch(e){}
    }

    function setWorldFormValues(cfg){
      worldNameInput.value=(cfg.worldName||"Overworld").slice(0,32);
      seedInput.value=cfg.seed||"";
      presetSelect.value=PRESET_HINTS[cfg.preset]?cfg.preset:"balanced";
      renderDistInput.value=String(Math.max(2,Math.min(8,Math.round(Number(cfg.renderDist)||3))));
      selectedResourcePackId=normalizeResourcePackId(cfg.resourcePack||selectedResourcePackId);
      syncPackButtonState();
      updateSeedPreview();
      updatePresetHint();
    }

    function buildWorldConfigFromForm(){
      const worldName=(worldNameInput.value.trim()||"Overworld").slice(0,32);
      const seed=(seedInput.value.trim()||randomSeedString()).slice(0,64);
      const preset=PRESET_HINTS[presetSelect.value]?presetSelect.value:"balanced";
      const renderDist=Math.max(2,Math.min(8,Math.round(Number(renderDistInput.value)||3)));
      const resourcePack=normalizeResourcePackId(selectedResourcePackId);
      return {worldName,seed,preset,renderDist,resourcePack};
    }

    function launchWorldFromConfig(cfg){
      const q=new URLSearchParams();
      if(cfg&&cfg.id)q.set("worldId",String(cfg.id));
      q.set("worldName",cfg.worldName);
      q.set("seed",cfg.seed||randomSeedString());
      q.set("preset",cfg.preset||"balanced");
      q.set("renderDist",String(Math.max(2,Math.min(8,Math.round(Number(cfg.renderDist)||3)))));
      q.set("pack",normalizeResourcePackId(cfg.resourcePack||selectedResourcePackId));
      location.href="game.html?"+q.toString();
    }

    function renderWorldList(){
      const worlds=getWorlds();
      worldList.innerHTML="";

      if(!worlds.length){
        rememberSelectedWorld(null);
        const empty=document.createElement("div");
        empty.className="empty-worlds";
        empty.textContent="No worlds yet.\nCreate your first world.";
        worldList.appendChild(empty);
        playWorldBtn.disabled=true;
        editWorldBtn.disabled=true;
        deleteWorldBtn.disabled=true;
        recreateWorldBtn.disabled=true;
        return;
      }

      const preferred=localStorage.getItem(LAST_WORLD_ID_KEY);
      const hasCurrent=selectedWorldId&&worlds.some(w=>w.id===selectedWorldId);
      if(!hasCurrent){
        const fallback=worlds.find(w=>w.id===preferred)||worlds[0];
        selectedResourcePackId=normalizeResourcePackId(fallback.resourcePack||selectedResourcePackId);
        syncPackButtonState();
        rememberSelectedWorld(fallback.id);
      }

      for(const world of worlds){
        const item=document.createElement("button");
        item.type="button";
        item.className="world-row"+(world.id===selectedWorldId?" active":"");
        item.setAttribute("role","option");
        item.setAttribute("aria-selected",world.id===selectedWorldId?"true":"false");

        const name=document.createElement("div");
        name.className="world-name";
        name.textContent=world.worldName;

        const thumb=document.createElement("div");
        thumb.className="world-thumb";
        const thumbImg=document.createElement("img");
        thumbImg.className="world-thumb-img";
        thumbImg.alt="";
        thumbImg.decoding="async";
        thumbImg.loading="lazy";
        thumbImg.src=getWorldThumbDataUrl(world);
        thumb.appendChild(thumbImg);

        const idx=worlds.findIndex(w=>w.id===editingWorldId);
        if(idx>=0){

          id:"world-"+now.toString(36)+"-"+randomUint32().toString(36),
          ...cfg,
          createdAt:now,
          updatedAt:now,
          lastPlayedAt:0

      rememberSelectedWorld(saved.id);

    function applyClickSfxVolume(settings=getSettings()){

    function disarmClickSfxUnlock(){
      if(!clickSfxUnlockArmed)return;
      ["pointerdown","keydown","touchstart"].forEach(evt=>document.removeEventListener(evt,onClickSfxUnlockGesture,true));
      clickSfxUnlockArmed=false;
    }

    function onClickSfxUnlockGesture(){
      if(clickSfxUnlocked){
        disarmClickSfxUnlock();
        return;
      }
      if(audioRecentlyFailed(clickSfx))return;

      const s=getSettings();
      const volume=applyClickSfxVolume(s);
      if(volume<=0.001)return;

      clickSfx.volume=0.001;
      clickSfx.currentTime=0;
      const p=clickSfx.play();

      const onUnlocked=()=>{
        clickSfx.pause();
        clickSfx.currentTime=0;
        clickSfxUnlocked=true;
        applyClickSfxVolume(s);
        disarmClickSfxUnlock();
      };

      if(p&&typeof p.then==="function")p.then(onUnlocked).catch(()=>{markAudioFailed(clickSfx);applyClickSfxVolume(s);});
      else onUnlocked();
    }

    function armClickSfxUnlock(){
      if(clickSfxUnlockArmed)return;

      clickSfx.currentTime=0;

      const p=clickSfx.play();

          disarmClickSfxUnlock();
        }).catch(()=>{markAudioFailed(clickSfx);armClickSfxUnlock();});

    function buildMenuChunkLayout(widthChunks,depthChunks){
      const w=Math.max(1,Math.floor(widthChunks));
      const d=Math.max(1,Math.floor(depthChunks));
      const halfW=Math.floor(w*0.5);
      const halfH=Math.floor(d*0.5);
      const minCX=-halfW;
      const minCZ=-halfH;
      const maxCX=minCX+w-1;
      const maxCZ=minCZ+d-1;

      const active=new Set();
      for(let cz=minCZ;cz<=maxCZ;cz++){
        for(let cx=minCX;cx<=maxCX;cx++)active.add(`${cx},${cz}`);
      }

      return {active,minCX,maxCX,minCZ,maxCZ};
    }

    function skyRand(a,b,c,seed){
      const v=Math.sin(a*12.9898+b*78.233+c*37.719+seed*0.00017)*43758.5453123;
      return v-Math.floor(v);
    }

    function paintSkyFace(size,seed,variant){
      const c=document.createElement("canvas");
      c.width=size;
      c.height=size;
      const ctx=c.getContext("2d");

      const g=ctx.createLinearGradient(0,0,0,size);
      if(variant==="top"){
        g.addColorStop(0,"#2d4b86");
        g.addColorStop(0.58,"#5a82c4");
        g.addColorStop(1,"#90b8e0");
      }else if(variant==="bottom"){
        g.addColorStop(0,"#88abd5");
        g.addColorStop(1,"#5e83b5");
      }else{
        g.addColorStop(0,"#4c72b3");
        g.addColorStop(0.56,"#89afd9");
        g.addColorStop(1,"#bdd7ed");
      }
      ctx.fillStyle=g;
      ctx.fillRect(0,0,size,size);

      const glowX=size*(0.28+skyRand(1,3,variant.length,seed)*0.34);
      const glowY=size*(variant==="top"?0.18:0.24+skyRand(2,4,variant.length,seed)*0.12);
      const glow=ctx.createRadialGradient(glowX,glowY,size*0.03,glowX,glowY,size*0.86);
      glow.addColorStop(0,variant==="top"?"rgba(255,255,255,0.20)":"rgba(255,248,229,0.13)");
      glow.addColorStop(0.34,"rgba(241,248,255,0.09)");
      glow.addColorStop(1,"rgba(255,255,255,0)");
      ctx.fillStyle=glow;
      ctx.fillRect(0,0,size,size);

      const horizon=ctx.createLinearGradient(0,size*0.46,0,size);
      horizon.addColorStop(0,"rgba(255,255,255,0)");
      horizon.addColorStop(1,variant==="bottom"?"rgba(255,255,255,0.11)":"rgba(255,255,255,0.07)");
      ctx.fillStyle=horizon;
      ctx.fillRect(0,0,size,size);

      for(let i=0;i<42;i++){
        const x=skyRand(i,6,variant.length,seed)*size;
        const y=skyRand(i,7,variant.length,seed)*size*0.72;
        const a=0.015+skyRand(i,8,variant.length,seed)*0.04;
        const s=0.6+skyRand(i,9,variant.length,seed)*1.3;
        ctx.fillStyle=`rgba(255,255,255,${a.toFixed(3)})`;
        ctx.fillRect(x,y,s,s);
      }

      return c;
    }

    function createMenuSkybox(seed){
      const size=512;
      const faces=[
        paintSkyFace(size,seed+11,"side"),
        paintSkyFace(size,seed+22,"side"),
        paintSkyFace(size,seed+33,"top"),
        paintSkyFace(size,seed+44,"bottom"),
        paintSkyFace(size,seed+55,"side"),
        paintSkyFace(size,seed+66,"side")
      ];
      const tex=new THREE.CubeTexture(faces);
      tex.colorSpace=THREE.SRGBColorSpace;
      tex.needsUpdate=true;
      return tex;
    }

    function applyMenuSkybox(seed){

      const minY=bgWorldBounds.waterLevel+52;
      const maxY=bgWorldBounds.waterLevel+76;

      for(let i=0;i<cloudCount;i++){
        const cloud=new THREE.Group();
        cloud.frustumCulled=false;

        const puffCount=3+Math.floor(rand()*5);
        const puffOpacity=0.70+rand()*0.12;
        for(let p=0;p<puffCount;p++){
          const puff=new THREE.Mesh(
            new THREE.BoxGeometry(8+rand()*8,2+rand()*1.6,6+rand()*7),
            new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:puffOpacity-(p*0.02),depthWrite:false})
          );
          puff.position.set((rand()-.5)*12,(rand()-.5)*2,(rand()-.5)*10);
          puff.castShadow=false;
          puff.receiveShadow=true;
          cloud.add(puff);
        }

        cloud.position.set(
          THREE.MathUtils.lerp(minX,maxX,rand()),
          THREE.MathUtils.lerp(minY,maxY,rand()),
          THREE.MathUtils.lerp(minZ,maxZ,rand())
        );
        cloud.userData.baseY=cloud.position.y;
        cloud.userData.phase=rand()*Math.PI*2;
        cloud.userData.bob=0.14+rand()*0.12;
        cloud.userData.spd=1.35+rand()*1.75;
        cloud.userData.resetZ=()=>THREE.MathUtils.lerp(minZ,maxZ,rand());
        layer.add(cloud);
      }

      return layer;
    }

    function updateMenuClouds(dt){
      if(!menuCloudGroup||!menuCloudGroup.children.length)return;
      const camX=camera.position.x;

      for(const cloud of menuCloudGroup.children){
        cloud.userData.phase=(cloud.userData.phase||0)+dt*(0.55+cloud.userData.spd*0.11);
        cloud.position.x+=cloud.userData.spd*dt;
        cloud.position.y=cloud.userData.baseY+Math.sin(cloud.userData.phase)*cloud.userData.bob;
        if(cloud.position.x-camX>120){
          cloud.position.x=camX-120;
          cloud.position.z=cloud.userData.resetZ();
        }
      }
    }

        depthTest:true,
        side:THREE.DoubleSide,
        toneMapped:false,
        uniforms:{
          uTint:{value:new THREE.Color(colorHex)},
          uStrength:{value:1}
        },
        vertexShader:`varying vec2 vUv;
void main(){
  vUv=uv;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
}`,
        fragmentShader:`varying vec2 vUv;
uniform vec3 uTint;
uniform float uStrength;
void main(){
  vec2 p=vUv-0.5;
  float d=length(p)*2.0;
  float core=1.0-smoothstep(0.0,0.86,d);
  float halo=smoothstep(1.0,0.22,d);
  float aura=smoothstep(1.0,0.58,d)*0.28;
  float alpha=(core*core*0.78+halo*0.20+aura)*uStrength;
  gl_FragColor=vec4(uTint,alpha);
}`
      });
    }

    function h2(x,z,s){
      const v=Math.sin(x*127.1+z*311.7+(s+noiseSeedOffset)*0.013)*43758.5453123;
      return v-Math.floor(v);
    }

    function sm(t){return t*t*(3-2*t);}

    function vn2(x,z,seed){
      const x0=Math.floor(x),z0=Math.floor(z);
      const tx=sm(x-x0),tz=sm(z-z0);
      const a=h2(x0,z0,seed),b=h2(x0+1,z0,seed),c=h2(x0,z0+1,seed),d=h2(x0+1,z0+1,seed);
      const ab=a+(b-a)*tx;
      const cd=c+(d-c)*tx;
      return ab+(cd-ab)*tz;
    }

    function fbm2(x,z,oct,gain,lac,seed){
      let a=0.5,f=1,sum=0,total=0;
      for(let i=0;i<oct;i++){
        sum+=vn2(x*f,z*f,seed+i*31)*a;
        total+=a;
        a*=gain;
        f*=lac;
      }
      return sum/Math.max(total,1e-6);
    }

    function rn2(x,z,seed){
      return 1-Math.abs(fbm2(x,z,4,0.5,2.0,seed)*2-1);
    }

    function normalizeMenuSeedValue(raw){
      const txt=String(raw??"").trim();
      if(!txt)return hashSeed("menu-default");
      if(/^-?\d+$/.test(txt)){
        try{
          const mod=2147483647n;
          let n=BigInt(txt)%mod;
          if(n<0)n+=mod;
          let v=Number(n);
          if(v===0)v=1;
          return v;
        }catch(e){}
      }
      return hashSeed(txt)||1;
    }

    function sampleMenuTerrainPoint(x,z,p,includeClimate=true){
      const warpA=fbm2(x*p.warpFreq,z*p.warpFreq,2,0.5,2.0,901)-0.5;
      const warpB=fbm2((x+337)*p.warpFreq,(z-211)*p.warpFreq,2,0.5,2.0,902)-0.5;
      const sx=x+warpA*p.warpAmp;
      const sz=z+warpB*p.warpAmp;

      const continental=fbm2(sx*p.contFreq,sz*p.contFreq,5,0.5,2.03,10);
      const hills=fbm2(sx*p.hillFreq,sz*p.hillFreq,4,0.5,2.05,20);
      const ridge=rn2(sx*p.ridgeFreq,sz*p.ridgeFreq,30);
      const erosion=fbm2(sx*p.erosionFreq,sz*p.erosionFreq,4,0.52,2.0,80);
      const detail=fbm2(sx*p.detailFreq,sz*p.detailFreq,3,0.54,2.2,40);

      const land=THREE.MathUtils.smoothstep(continental,p.landStart,p.landEnd);
      const erosionInv=1-erosion;
      const mountain=Math.pow(Math.max(0,ridge-0.16),1.72)*(0.42+erosionInv*0.88);

      let bh=p.base+land*p.landLift+hills*p.hillLift+(detail-0.5)*p.detailLift+mountain*p.mountainLift;

      const oceanMask=Math.max(0,1-land);
      if(oceanMask>0){
        bh-=oceanMask*oceanMask*p.oceanDepth;
        const trench=rn2(sx*p.trenchFreq,sz*p.trenchFreq,205);
        bh-=Math.max(0,(trench-0.83)/0.17)*oceanMask*p.trenchDepth;
      }

      const riverBase=fbm2(sx*p.riverFreq,sz*p.riverFreq,4,0.5,2.0,200);
      const riverRidge=1-Math.abs(riverBase*2-1);
      const riverCore=Math.max(0,(riverRidge-p.riverThreshold)/(1-p.riverThreshold));
      const riverStrength=(land>0.22&&mountain<1.05)?riverCore*Math.max(0,1-mountain*0.62):0;
      if(riverStrength>0){
        const riverTarget=MENU_WORLD_WATER_LEVEL-(p.riverDepthMin+riverStrength*p.riverDepthRange);
        bh=THREE.MathUtils.lerp(bh,riverTarget,Math.min(1,riverStrength*p.riverCarve));
      }

      let moisture=0.5,temperature=0.5;
      if(includeClimate){
        moisture=fbm2(sx*p.moistFreq,sz*p.moistFreq,4,0.55,2.0,50);
        temperature=fbm2(sx*p.tempFreq+90,sz*p.tempFreq-45,4,0.55,2.0,60);
        const latitude=fbm2((sx+320)*0.0012,(sz-180)*0.0012,2,0.5,2.0,61);
        temperature=THREE.MathUtils.clamp(temperature*0.82+latitude*0.18,0,1);
      }

      return {heightRaw:bh,land,mountain,erosion,moisture,temperature,riverStrength,continental};
    }

    function getMenuCol(x,z){
      const k=menuColKey(x,z);
      if(menuColCache.has(k))return menuColCache.get(k);

      const p=currentMenuPreset();
      const center=sampleMenuTerrainPoint(x,z,p,true);
      const nE=sampleMenuTerrainPoint(x+1,z,p,false).heightRaw;
      const nW=sampleMenuTerrainPoint(x-1,z,p,false).heightRaw;
      const nN=sampleMenuTerrainPoint(x,z-1,p,false).heightRaw;
      const nS=sampleMenuTerrainPoint(x,z+1,p,false).heightRaw;
      const ring=(center.heightRaw*4+nE+nW+nN+nS)/8;

      let bh=THREE.MathUtils.lerp(center.heightRaw,ring,p.smoothing);
      bh+=(h2(x*53+7,z*47-9,451)-0.5)*p.microRelief;

      const cliffMask=Math.max(0,(center.mountain-0.62)*1.9)*Math.max(0,0.56-center.erosion)*p.cliffStrength;
      if(cliffMask>0){
        const cliffN=fbm2(x*0.031,z*0.031,2,0.5,2.0,90)-0.5;
        bh+=cliffN*cliffMask*2.6;
      }

      const height=Math.floor(THREE.MathUtils.clamp(bh,2,MENU_WORLD_HEIGHT-5));
      const isRiver=center.riverStrength>0.30&&height<=MENU_WORLD_WATER_LEVEL+2;

      let biome="plains";
      let surfaceTag="grass";
      let fillerTag="dirt";
      let subFillerTag="dirt";
      let treeType="oak";

      const temperature=center.temperature;
      const moisture=center.moisture;
      const beach=height<=MENU_WORLD_WATER_LEVEL+1&&height>=MENU_WORLD_WATER_LEVEL-1;
      const under=height<MENU_WORLD_WATER_LEVEL-1;
      const deepOcean=height<MENU_WORLD_WATER_LEVEL-4;
      const roughCliff=cliffMask>0.16&&center.land>0.30&&center.land<0.82;
      const alpine=center.mountain>0.76&&height>MENU_WORLD_WATER_LEVEL+15;
      const stonyHigh=height>MENU_WORLD_WATER_LEVEL+14&&center.mountain>0.62&&center.erosion<0.50;

      if(deepOcean){
        biome="ocean";
        if(temperature<0.25){surfaceTag="clay";fillerTag="clay";subFillerTag="stone";}
        else if(temperature>0.68&&moisture<0.42){surfaceTag="red_sand";fillerTag="sand";subFillerTag="sand";}
        else{surfaceTag="sand";fillerTag="sand";subFillerTag="clay";}
        treeType="none";
      }else if(isRiver){
        biome="river";
        const rm=h2(x*9+31,z*7+17,74);
        if(rm>0.76){surfaceTag="gravel";fillerTag="gravel";subFillerTag="clay";}
        else if(rm<0.22){surfaceTag="clay";fillerTag="clay";subFillerTag="clay";}
        else{surfaceTag="sand";fillerTag="sand";subFillerTag="clay";}
        treeType="none";
      }else if(stonyHigh){
        biome="stony_peaks";surfaceTag="gravel";fillerTag="stone";subFillerTag="stone";treeType="none";
      }else if(alpine){
        biome="mountain";surfaceTag="snow";fillerTag="stone";subFillerTag="stone";treeType="pine";
      }else if(temperature<0.24){
        if(height>MENU_WORLD_WATER_LEVEL+4){
          biome=temperature<0.15?"snow":"taiga";
          surfaceTag="snow";fillerTag="dirt";subFillerTag="stone";treeType="pine";
        }else{
          biome="tundra";surfaceTag="snow";fillerTag="dirt";subFillerTag="stone";treeType="none";
        }
      }else if(temperature>0.70){
        if(moisture<0.24&&center.land>0.44&&center.erosion<0.44){
          biome="badlands";surfaceTag="red_sand";fillerTag="red_sand";subFillerTag="gravel";treeType="cactus";
        }else if(moisture<0.39){
          biome="desert";surfaceTag="sand";fillerTag="sand";subFillerTag="sand";treeType="cactus";
        }else if(moisture>0.74){
          biome="jungle";surfaceTag="grass";fillerTag="dirt";subFillerTag="dirt";treeType="jungle";
        }else{
          biome="savanna";surfaceTag="grass";fillerTag="dirt";subFillerTag="dirt";treeType="acacia";
        }
      }else{
        if(moisture>0.84&&temperature>0.42&&temperature<0.66){
          biome="mangrove";surfaceTag="mud";fillerTag="mud";subFillerTag="clay";treeType="jungle";
        }else if(moisture>0.76&&temperature>0.35&&temperature<0.60){
          biome="swamp";surfaceTag="mud";fillerTag="mud";subFillerTag="clay";treeType="oak";
        }else if(moisture>0.52&&center.erosion>0.55){
          biome="meadow";surfaceTag="grass";fillerTag="dirt";subFillerTag="dirt";treeType="none";
        }else if(moisture>0.60){
          biome="forest";surfaceTag="grass";fillerTag="dirt";subFillerTag="dirt";treeType=moisture>0.76?"birch":"oak";
        }else if(moisture>0.36){
          biome="plains";surfaceTag="grass";fillerTag="dirt";subFillerTag="dirt";
          treeType=h2(x*5,z*7,72)<0.36?"oak":"none";
        }else{
          biome="plains";surfaceTag="grass";fillerTag="dirt";subFillerTag="dirt";treeType="oak";
        }
      }

      if(beach&&biome!=="snow"&&biome!=="tundra"&&biome!=="river"&&biome!=="ocean"){
        const shoreN=h2(x*9+31,z*7+17,73);
        if(roughCliff&&shoreN>0.34){
          biome="rocky_shore";surfaceTag="gravel";fillerTag="gravel";subFillerTag="stone";
        }else{
          const warmBeach=temperature>0.66&&moisture<0.42;
          surfaceTag=warmBeach?"red_sand":"sand";
          fillerTag=surfaceTag;
          subFillerTag=(moisture>0.74||biome==="mangrove")?"clay":surfaceTag;
        }
        treeType="none";
      }

      if(under&&biome!=="river"){
        if(deepOcean){
          biome="ocean";
          if(temperature<0.25){surfaceTag="clay";fillerTag="clay";subFillerTag="stone";}
          else if(temperature>0.68&&moisture<0.42){surfaceTag="red_sand";fillerTag="sand";subFillerTag="sand";}
          else{surfaceTag="sand";fillerTag="sand";subFillerTag="clay";}
        }else if(biome==="swamp"||biome==="mangrove"){
          surfaceTag="mud";fillerTag="mud";subFillerTag="clay";
        }else if(roughCliff||biome==="mountain"||biome==="stony_peaks"||biome==="rocky_shore"){
          surfaceTag="stone";fillerTag="stone";subFillerTag="stone";
        }else{
          surfaceTag="dirt";fillerTag="dirt";subFillerTag="stone";
        }
        treeType="none";
      }

      if((biome==="mountain"||biome==="stony_peaks")&&height>MENU_WORLD_WATER_LEVEL+22)treeType="pine";

      const dens={
        snow:0.007,taiga:0.030,tundra:0,desert:0.005,savanna:0.009,forest:0.048,plains:0.017,
        river:0,mountain:0.010,jungle:0.095,swamp:0.028,badlands:0.002,meadow:0.010,mangrove:0.026,
        rocky_shore:0,stony_peaks:0,ocean:0
      };
      const tch=(biome!=="snow"||alpine)&&!beach&&!under&&!isRiver?(dens[biome]??0.018):0;
      const tn=h2(x*13,z*17,70);
      const hasTree=treeType!=="none"&&tch>0&&tn>1-tch&&h2(Math.floor(x/2),Math.floor(z/2),71)>0.78;

      const col={height,biome,surfaceTag,fillerTag,subFillerTag,hasTree,treeType};
      menuColCache.set(k,col);
      return col;
    }

    const _jitC=new THREE.Color();
    const _jitA=new THREE.Color();
    const _jitHSL={h:0,s:0,l:0};

    function rgb(hex){
      const c=new THREE.Color(hex);
      return [Math.round(c.r*255),Math.round(c.g*255),Math.round(c.b*255),255];
    }

    function jit(hex,amt,salt){
      _jitC.set(hex);
      _jitC.getHSL(_jitHSL);
      const v=(salt-0.5)*amt;
      _jitA.setHSL(
        _jitHSL.h,
        THREE.MathUtils.clamp(_jitHSL.s+v*0.2,0,1),
        THREE.MathUtils.clamp(_jitHSL.l+v,0,1)
      );
      return [Math.round(_jitA.r*255),Math.round(_jitA.g*255),Math.round(_jitA.b*255),255];
    }

    function makeBlockTexture(draw){
      const c=document.createElement("canvas");
      c.width=16;c.height=16;
      const ctx=c.getContext("2d");
      const img=ctx.createImageData(16,16);
      const data=img.data;

      for(let y=0;y<16;y++){
        for(let x=0;x<16;x++){
          const i=(x+y*16)*4;
          const col=draw([x,y]);
          data[i]=col[0];
          data[i+1]=col[1];
          data[i+2]=col[2];
          data[i+3]=col[3]??255;
        }
      }

      ctx.putImageData(img,0,0);
      const tex=new THREE.CanvasTexture(c);
      tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
      tex.colorSpace=THREE.SRGBColorSpace;
      tex.magFilter=tex.minFilter=THREE.NearestFilter;
      tex.generateMipmaps=false;
      tex.needsUpdate=true;
      return tex;
    }

    let animatedWaterTex=null;
    let sampleTerrainHeight=(x,z)=>MENU_WORLD_WATER_LEVEL;

    function buildWorldBackground(seedText){
      noiseSeedOffset=normalizeMenuSeedValue(seedText||"menu-default");
      menuWorldPresetKey=PRESET_HINTS[presetSelect.value]?presetSelect.value:"balanced";
      clearMenuColumnCache();
      applyMenuSkybox(noiseSeedOffset);
      ensureMenuCelestialRig();
      menuSkyPhase=0.48+(h2(13,17,942)-0.5)*0.05;

      const minX=MENU_BG_MIN_X;
